# 资讯脉搏 · 分类与新闻源配置
# 改这个文件就能调整：抓哪些源、分哪些类、每类关心哪些关键词。

# 全局 RSS 源（科技类，国内原生 RSS、无需翻墙）。
# 说明：很多国内媒体没有官方 RSS，可后续用 RSSHub 自建后把路由 URL 加到这里。
feeds:
  - name: "IT之家"
    url: "https://www.ithome.com/rss/"
  - name: "少数派"
    url: "https://sspai.com/feed"
  # - name: "36氪"          # 如有可用 RSS/RSSHub 路由，取消注释并填 url
  #   url: ""

# 分类：从上面所有源抓到的新闻里，按 keywords 命中标题/摘要来归类。
categories:
  - id: cat_ai
    name: "AI 大模型"
    icon: "🤖"
    keywords:
      ["大模型","DeepSeek","深度求索","Claude","Anthropic","GPT","OpenAI","ChatGPT",
       "Gemini","Grok","xAI","Kimi","Moonshot","智谱","GLM","通义","Qwen","千问",
       "MiniMax","文心","豆包","Sora","NotebookLM","推理模型","开源模型","AI 模型"]

  - id: cat_ev
    name: "新能源车企"
    icon: "🚗"
    keywords:
      ["新能源","电动车","纯电","混动","比亚迪","特斯拉","小米汽车","SU7","蔚来",
       "小鹏","理想","问界","鸿蒙智行","极氪","埃安","零跑","哪吒","充电","电池",
       "续航","交付","销量"]

  - id: cat_internet
    name: "互联网大厂"
    icon: "🏢"
    keywords:
      ["腾讯","阿里","阿里巴巴","字节","字节跳动","抖音","百度","美团","京东","拼多多",
       "华为","微信","网易","快手","小红书","B站","哔哩哔哩","财报","出海","裁员"]

# ───────────────────────────────────────────────────────────────
# 如何新增分类（无需改代码，只加下面这样一段即可）：
#   - id:   唯一英文 id（如 cat_sports）
#   - name: 显示名
#   - icon: emoji 图标
#   - keywords: 命中标题/摘要即归入本类（从全局 feeds 里筛）
#   - feeds: （可选）本分类专属 RSS 源。当全局源覆盖不到该领域时很有用，
#            来自专属源的新闻会直接归入本类（仍只保留目标日期当天的）。
#
# 示例：体育明星（全局科技源没有体育新闻，所以给它配专属源）
